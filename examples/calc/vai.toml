[lib]
name = "calc_app"
prompts = "./prompts"

[[llm]]
name = "architect"
role = "plan"
provider = "anthropic"
model = "claude-sonnet-4-6"
max_tokens = 8000
max_retries = 2
delay_retry_seconds = 2

[[llm]]
name = "coder"
role = "code"
provider = "anthropic"
model = "claude-haiku-4-5"
max_tokens = 4000
max_retries = 3
delay_retry_seconds = 1

[debug]
max_attempts = 5

[debug.languages.rust]
compile_check = "rustc -o /tmp/vai_calc {target}"
tools = []
